background {
    path = ~/Wallpaper/wallpaper.jpg

    blur_passes = 3
    blur_size = 8

    noise = 0.0117
    contrast = 1.1
    brightness = 0.9
    vibrancy = 0.2
}

general {
    hide_cursor = false
}

label {
    monitor =

    text = cmd[update:1000] echo "$(date +"%H:%M")"

    color = rgba(f5f1faff)

    font_size = 90
    font_family = JetBrainsMono Nerd Font

    position = 0, 180
    halign = center
    valign = center
}

label {
    monitor =

    text = cmd[update:1000] echo "$(date +"%A, %d %B %Y")"

    color = rgba(b7a1e6ff)

    font_size = 22
    font_family = JetBrainsMono Nerd Font

    position = 0, 90
    halign = center
    valign = center
}

input-field {
    monitor =

    size = 280, 55

    outline_thickness = 2

    dots_size = 0.25
    dots_spacing = 0.15

    outer_color = rgba(9d7cd8ff)
    inner_color = rgba(141421dd)

    font_color = rgba(f5f1faff)

    fade_on_empty = false

    placeholder_text = Password...

    position = 0, -120

    halign = center
    valign = center

    rounding = 14
}

label {
    monitor =

    text = cmd[update:60000] echo "$USER"

    color = rgba(d8b46aff)

    font_size = 18
    font_family = JetBrainsMono Nerd Font

    position = 0, -190

    halign = center
    valign = center
}